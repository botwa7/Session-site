<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWA-MD | Session Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ti animasyon nan background lan */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(15px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        p { color: #ccc; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }

        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--primary); }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Kote kòd la ap parèt */
        #result-container {
            margin-top: 25px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .code-box {
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed var(--primary);
            font-family: monospace;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: 5px;
            margin-bottom: 15px;
            position: relative;
        }

        .copy-btn {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-btn:hover { background: var(--primary); color: #000; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { margin-top: 30px; font-size: 0.7rem; color: #555; }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>EDWA-MD</h1>
        <p>Jenere Session ID ou an sekirite</p>

        <div class="input-group">
            <label>Nimewo WhatsApp (ak kòd peyi)</label>
            <input type="text" id="phone" placeholder="Ex: 50944XXXXXX">
        </div>

        <button class="btn" id="pairBtn" onclick="getPairingCode()">Jwenn Pairing Code</button>

        <div id="result-container">
            <p style="margin-bottom: 10px; color: var(--primary);">Kòd ou a pare :</p>
            <div class="code-box" id="pairing-code">------</div>
            <button class="copy-btn" onclick="copyCode()">Kopiye Kòd</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #888;">
                Antre kòd sa a nan WhatsApp ou (Linked Devices)
            </p>
        </div>

        <footer>© 2024 Boss Edwa - Tout dwa rezève</footer>
    </div>

    <script>
        async function getPairingCode() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('pairBtn');
            const resultContainer = document.getElementById('result-container');
            const codeBox = document.getElementById('pairing-code');

            if (!phone) return alert('Silvouplè antre nimewo a!');

            btn.disabled = true;
            btn.textContent = 'Jenere...';

            try {
                const response = await fetch('/api/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await response.json();

                if (data.success) {
                    codeBox.textContent = data.code;
                    resultContainer.style.display = 'block';
                } else {
                    alert('Erè: ' + data.error);
                }
            } catch (e) {
                alert('Sèvè a pa reponn.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Jwenn Pairing Code';
            }
        }

        function copyCode() {
            const code = document.getElementById('pairing-code').textContent;
            navigator.clipboard.writeText(code);
            alert('Kòd kopiye!');
        }
    </script>
</body>
</html>
